name: Auto-Label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    # Fork PRs get a read-only default GITHUB_TOKEN under the `pull_request`
    # trigger, so actions/labeler's write (sync-labels: true) would 403 and
    # fail this check for every external contributor. Skip on fork PRs —
    # this is not a required status check, so skipping leaves nothing stuck.
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels based on changed files
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          sync-labels: true
